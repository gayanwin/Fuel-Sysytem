<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Price Adjustment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased pb-20">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-slate-800">FUEL SYSTEM</h1>
                <div id="systemStatus" class="flex items-center gap-1.5 mt-0.5">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">System Syncing...</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- Refresh Button -->
                <button id="refreshBtn" class="p-2.5 bg-slate-100 text-slate-600 rounded-2xl hover:bg-blue-50 transition-all">
                    <i class="fa-solid fa-arrows-rotate text-sm"></i>
                </button>
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-gas-pump text-white"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Top Price Grid -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase">LP 92</span>
                <div class="flex items-baseline gap-1 mt-1">
                    <span class="text-xs font-bold text-slate-400">Rs.</span>
                    <span id="price_lp92" class="text-2xl font-black text-slate-800">000</span>
                </div>
            </div>
            <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase">LP 95</span>
                <div class="flex items-baseline gap-1 mt-1">
                    <span class="text-xs font-bold text-slate-400">Rs.</span>
                    <span id="price_lp95" class="text-2xl font-black text-slate-800">000</span>
                </div>
            </div>
            <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase">LAD</span>
                <div class="flex items-baseline gap-1 mt-1">
                    <span class="text-xs font-bold text-slate-400">Rs.</span>
                    <span id="price_lad" class="text-2xl font-black text-slate-800">000</span>
                </div>
            </div>
            <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase">LSD</span>
                <div class="flex items-baseline gap-1 mt-1">
                    <span class="text-xs font-bold text-slate-400">Rs.</span>
                    <span id="price_lsd" class="text-2xl font-black text-slate-800">000</span>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <section class="space-y-4">
            <!-- Dynamic Title -->
            <h3 id="fuelTitle" class="text-sm font-black text-slate-800 uppercase tracking-tight ml-1">Live 92 Octane Prices</h3>
            <div id="priceHistoryList" class="space-y-2">
                <!-- Tabs and List will be injected here -->
            </div>
        </section>

        <!-- Vehicle List -->
        <section class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight">Your Vehicles</h3>
                <button onclick="document.getElementById('vehicleModal').classList.remove('hidden')" class="text-[10px] font-black bg-blue-600 text-white px-4 py-1.5 rounded-full shadow-lg shadow-blue-100">ADD NEW</button>
            </div>
            <div id="vehicleList" class="space-y-3"></div>
        </section>

        <!-- Calculator Panel -->
        <section id="calculatorPanel" class="hidden space-y-4 pt-4 border-t border-slate-200">
            <div class="bg-blue-600 p-6 rounded-[2rem] shadow-xl shadow-blue-100 text-white relative overflow-hidden">
                <div class="relative z-10">
                    <span class="text-[10px] font-black uppercase opacity-60 tracking-widest">Total Adjustment</span>
                    <div class="flex items-baseline gap-2 mt-1">
                        <span class="text-lg font-bold opacity-80">Rs.</span>
                        <span id="totalAdjustmentValue" class="text-4xl font-black">0.00</span>
                    </div>
                    <div class="mt-4 flex items-center gap-2">
                        <span id="activeVehicleLabel" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter"></span>
                    </div>
                </div>
            </div>
            <div id="dateRangesContainer"></div>
            <button id="addRangeBtn" class="w-full py-4 bg-white border-2 border-dashed border-slate-300 rounded-[2rem] text-slate-400 text-xs font-black uppercase hover:bg-slate-50 flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus text-[10px]"></i> Add Fueling Date
            </button>
            <button id="clearAllRangesBtn" class="w-full py-2 text-slate-400 text-[10px] font-black uppercase tracking-widest">Clear All</button>
        </section>
    </main>

    <!-- Modal -->
    <div id="vehicleModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 space-y-6 shadow-2xl">
            <h4 class="text-xl font-black text-slate-800">Add Vehicle</h4>
            <div class="space-y-4">
                <input type="text" id="vehPlateInput" placeholder="Plate Number" class="w-full px-5 py-4 bg-slate-50 border-0 rounded-2xl font-bold text-slate-700">
                <input type="number" id="vehFixedPriceInput" placeholder="Fixed Price (Rs.)" class="w-full px-5 py-4 bg-slate-50 border-0 rounded-2xl font-bold text-slate-700">
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('vehicleModal').classList.add('hidden')" class="flex-1 py-4 text-slate-400 text-xs font-black uppercase">Cancel</button>
                <button onclick="saveVehicle()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl text-xs font-black uppercase">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
