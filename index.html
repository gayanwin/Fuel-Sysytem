<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Price Adjustment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <!-- Header -->
    <div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow-sm mb-4 flex justify-between items-center border border-gray-100">
        <div>
            <h1 class="text-lg font-black text-gray-800">FUEL SYSTEM</h1>
            <p id="systemStatus" class="text-[9px] text-gray-400 font-black uppercase tracking-widest">Connecting...</p>
        </div>
        <button id="refreshBtn" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-blue-50 transition-colors">
            <i class="fa-solid fa-arrows-rotate text-gray-600"></i>
        </button>
    </div>

    <!-- Live Prices Grid -->
    <div class="max-w-md mx-auto grid grid-cols-2 gap-2 mb-6">
        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase">LP 92</p>
            <p class="text-xl font-black text-gray-800">Rs. <span id="price_lp92">000</span></p>
        </div>
        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase">LP 95</p>
            <p class="text-xl font-black text-gray-800">Rs. <span id="price_lp95">000</span></p>
        </div>
        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase">LAD</p>
            <p class="text-xl font-black text-gray-800">Rs. <span id="price_lad">000</span></p>
        </div>
        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase">LSD</p>
            <p class="text-xl font-black text-gray-800">Rs. <span id="price_lsd">000</span></p>
        </div>
    </div>

    <!-- History with Dynamic Title and Tabs -->
    <div class="max-w-md mx-auto mb-6">
        <!-- මේක තමයි උඹ වෙනස් කරන්න කියපු නම වැටෙන තැන -->
        <h3 id="fuelTitle" class="text-[11px] font-black text-gray-500 uppercase mb-3 ml-1 tracking-tight">Live 92 Octane Prices</h3>
        
        <div id="fuelTabs" class="flex justify-center gap-1.5 mb-4">
            <!-- Buttons dynamically generated in JS -->
        </div>

        <div id="priceHistoryList" class="space-y-2">
            <!-- History rows -->
        </div>
    </div>

    <!-- Vehicles -->
    <div class="max-w-md mx-auto bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xs font-black text-gray-800 uppercase">My Vehicles</h3>
            <button onclick="document.getElementById('vehicleModal').classList.remove('hidden')" class="bg-blue-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-black uppercase">Add New</button>
        </div>
        <div id="vehicleList" class="space-y-2"></div>
    </div>

    <!-- Calculator -->
    <div id="calculatorPanel" class="max-w-md mx-auto hidden mt-4 pt-4 border-t border-gray-200">
        <div class="bg-blue-600 p-6 rounded-2xl text-white shadow-lg mb-4">
            <p class="text-[10px] font-black opacity-70 uppercase tracking-widest">Total Adjustment</p>
            <p class="text-3xl font-black">Rs. <span id="totalAdjustmentValue">0.00</span></p>
            <div class="flex items-center gap-2 mt-2">
                <span id="activeVehicleLabel" class="text-[9px] font-black bg-white/20 px-2 py-1 rounded uppercase"></span>
                <span class="text-[9px] font-bold opacity-60">LP 92 Basis</span>
            </div>
        </div>
        <div id="dateRangesContainer"></div>
        <button id="addRangeBtn" class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 text-[11px] font-black uppercase mb-2 hover:bg-gray-50 transition-colors">+ Add Fueling Date</button>
        <button id="clearAllRangesBtn" class="w-full text-gray-400 text-[9px] font-black uppercase py-2">Clear All</button>
    </div>

    <!-- Vehicle Modal -->
    <div id="vehicleModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h4 class="font-black text-gray-800 mb-4 uppercase text-sm">Add New Vehicle</h4>
            <div class="space-y-3">
                <input type="text" id="vehPlateInput" placeholder="Plate No (e.g. CAD-5050)" class="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold border-0 focus:ring-2 focus:ring-blue-500">
                <input type="number" id="vehFixedPriceInput" placeholder="Fixed Price (Rs.)" class="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold border-0 focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="document.getElementById('vehicleModal').classList.add('hidden')" class="flex-1 py-3 text-gray-400 text-xs font-black uppercase">Cancel</button>
                <button onclick="saveVehicle()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl text-xs font-black uppercase shadow-lg shadow-blue-200">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
